services:
  - type: web
    name: clipso-backend
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run prisma:generate && npm run build
    startCommand: npm run prisma:push && node dist/index.js
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_INLINE_WORKER
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: METRICS_REFRESH_CRON
        value: "*/15 * * * *"
      - key: ENABLE_MOCK_CRAWLER
        value: "true"
