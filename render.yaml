services:
  - type: web
    name: clipso-api
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm run build && npm run prisma:generate
    startCommand: npm run prisma:push && npm run start
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clipso-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: clipso-redis
          property: connectionString
      - key: METRICS_REFRESH_CRON
        value: "*/15 * * * *"
      - key: ENABLE_MOCK_CRAWLER
        value: "true"

  - type: worker
    name: clipso-worker
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm run build && npm run prisma:generate
    startCommand: npm run prisma:push && npm run start:worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clipso-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: clipso-redis
          property: connectionString
      - key: METRICS_REFRESH_CRON
        value: "*/15 * * * *"
      - key: ENABLE_MOCK_CRAWLER
        value: "true"

  - type: redis
    name: clipso-redis
    plan: free
    ipAllowList: []

databases:
  - name: clipso-postgres
    databaseName: clipso
    user: clipso
    plan: free
