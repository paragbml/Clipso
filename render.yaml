services:
  - type: web
    name: clipso-api
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm run build && npm run prisma:generate
    startCommand: npm run prisma:push && npm run seed && npm run start
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_INLINE_WORKER
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: METRICS_REFRESH_CRON
        value: "*/15 * * * *"
      - key: ENABLE_MOCK_CRAWLER
        value: "true"
